<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Drowsiness Detector</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

    <div class="container">

        <h1>😴 Driver Drowsiness Detector</h1>

        <div class="video-container">

            <video
                id="video"
                autoplay
                playsinline
                muted
            ></video>

            <canvas
                id="canvas"
                hidden
            ></canvas>

        </div>

        <div id="status" class="status">

            Initializing camera...

        </div>

        <div class="info">

            <p>

                EAR:
                <span id="ear">0.000</span>

            </p>

        </div>

    </div>

    <script
        src="{{ url_for('static', filename='js/script.js') }}"
    ></script>

</body>
