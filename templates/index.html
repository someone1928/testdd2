<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Driver Drowsiness Detection</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

    <div class="container">

        <h1>😴 Driver Drowsiness Detector</h1>

        <div class="video-container">

            <video
                id="video"
                autoplay
                playsinline
                muted
            ></video>

            <canvas
                id="canvas"
                hidden
            ></canvas>

        </div>

        <div
            id="status"
            class="status"
        >
            Initializing Camera...
        </div>

        <div class="info">

            <div class="card">

                <h3>EAR</h3>

                <span id="ear">0.000</span>

            </div>

            <div class="card">

                <h3>Eyes Closed</h3>

                <span id="closed-time">0.0</span>s

            </div>

        </div>

    </div>

    <script
        src="{{ url_for('static', filename='js/script.js') }}"
    ></script>

</body>

</html>
